services:
  - type: web
    name: zungo-coffee-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /docs
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_PROJECT_REF
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
